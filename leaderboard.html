<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard - Spring Contest 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #1e2447;
    --accent: #f4c542;
    --bg: #f7f8fc;
    --text-muted: #999;
  }
  body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px 0; }
  
  .container { max-width: 480px; width: 92%; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.08); margin-top: 20px; }

  /* LOGIN BOX */
  .login-box { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px 20px; gap: 15px; text-align: center; }
  .login-box h2 { color: var(--primary); margin: 0 0 10px; font-weight: 800; font-size: 24px; }
  .login-box input { padding: 14px; border-radius: 12px; border: 1px solid #ddd; width: 80%; font-family: inherit; font-size: 15px; outline: none; }
  .login-box button { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 14px 30px; font-weight: 700; cursor: pointer; width: 85%; font-size: 16px; transition: 0.2s; }
  .login-box button:hover { opacity: 0.9; }

  /* HEADER: All Caps, Montserrat bold */
  .header { background: var(--primary); color: white; text-align: center; padding: 40px 20px 30px; }
  .header h1 { margin: 0; font-size: 28px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; color: #fff; }

  .content { padding: 30px 15px; }

  /* LEADERBOARD LIST - Grid 4 cột mới (Rank, Name, LV, Points) */
  .table-header { display: grid; grid-template-columns: 50px 1.2fr 45px 75px; padding: 0 15px 10px; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  
  .list-container { display: flex; flex-direction: column; gap: 10px; }
  
  .row { 
    display: grid; 
    grid-template-columns: 50px 1.2fr 45px 75px; 
    padding: 16px 15px; 
    align-items: center; 
    background: #fff; 
    border-radius: 14px; 
    font-size: 13px; 
    border: 1px solid #f2f2f2; 
    color: #444;
    transition: 0.2s;
  }

  /* TOP 1 & ME HIGHLIGHT */
  .row.top1 { 
    background: #fffdf2; 
    border-color: var(--accent); 
    font-weight: 700; 
    color: var(--primary);
    box-shadow: 0 4px 15px rgba(244, 197, 66, 0.15);
  }
  
  .row.me { 
    background: #eff2ff; 
    border-color: #3d4da0; 
    border-style: dashed; /* Thêm dashed để phân biệt rõ */
    font-weight: 800; 
    color: var(--primary);
  }

  .rank-col { font-weight: 800; font-size: 14px; text-align: center; }
  .name-col { font-weight: 600; text-align: left; }
  .level-col { text-align: center; font-weight: 700; color: var(--accent); font-size: 12px; } /* Cột LV nổi bật màu vàng */
  .points-col { font-weight: 700; text-align: right; color: var(--primary); font-family: inherit; font-size: 14px; } /* Phông Montserrat chuẩn */

  #list-wrapper { display: none; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-weight: 600; }
</style>
</head>
<body>

<div class="container">
  <div class="login-box" id="login">
    <h2>🏆 Leaderboard</h2>
    <input type="text" id="userIdInput" placeholder="Enter your userID">
    <button onclick="start()">View Rankings</button>
  </div>

  <div id="list-wrapper">
    <div class="header">
      <h1>LEADERBOARD</h1>
    </div>

    <div class="content">
      <div class="table-header">
        <div>Rank</div>
        <div>Participant</div>
        <div style="text-align:center">LV</div> <div style="text-align:right">Points</div>
      </div>
      
      <div class="list-container" id="list">
        <div class="loading">Loading rankings...</div>
      </div>
    </div>
  </div>
</div>

<script>
// Giữ nguyên API và Logic của bạn
const apiUrl = "https://script.google.com/macros/s/AKfycbzAxLNImv5gHZEDrH5uMo-p7doRlJrmee3dfT-bBP_6K3w8N4zRAF-GyI-OsE17ST1pKA/exec";
let currentUserId = "";

// Cấu hình Levels của bạn
const LEVELS = [
  { points: 1000 }, { points: 2000 }, { points: 5000 }, { points: 10000 }, { points: 25000 }, { points: 50000 }, { points: 150000 }
];

// Hàm mask email
function maskEmail(email){
  if(!email) return "";
  const [n,d] = email.split("@");
  return n.slice(0,2) + "***@" + d;
}

// Hàm tính Level từ Points
function getLevel(points) {
  let level = 0;
  for (let i = 0; i < LEVELS.length; i++) {
    if (points >= LEVELS[i].points) level = i + 1;
  }
  return level;
}

// Hàm start
function start(){
  const userId = document.getElementById("userIdInput").value.trim();
  if(!userId) return alert("Enter userID");

  currentUserId = userId;
  document.getElementById("login").style.display = "none";
  document.getElementById("list-wrapper").style.display = "block";

  loadLeaderboard();
}

// Hàm JSONP load
function loadLeaderboard(){
  const url = apiUrl + "?userId=" + encodeURIComponent(currentUserId) + "&callback=handleData";
  const script = document.createElement("script");
  script.src = url;
  document.body.appendChild(script);
}

// Callback xử lý dữ liệu
window.handleData = function(data){
  if(data.error){
    document.getElementById("list").innerHTML = `<div style="color:red; text-align:center;">${data.error}</div>`;
    return;
  }
  renderLeaderboard(data);
}

// Hàm render dữ liệu với cột Level mới
function renderLeaderboard(data){
  const leaderboard = data.leaderboard || [];
  
  // Render danh sách chính (Top 5+...)
  let html = leaderboard.map(u => {
    const isMe = u.userId === currentUserId;
    const isTop1 = u.rank === 1;
    const level = getLevel(u.points); // Tính Level cho từng user
    
    return `
      <div class="row ${isMe ? 'me' : ''} ${isTop1 ? 'top1' : ''}">
        <div class="rank-col">${isTop1 ? '👑' : '#' + u.rank}</div>
        <div class="name-col">${isMe ? "YOU" : maskEmail(u.email)}</div>
        <div class="level-col">${level}</div> <div class="points-col">${u.points.toLocaleString()}</div> </div>
    `;
  }).join("");

  // FIX YOU (Nếu không nằm trong top vẫn hiện dòng cuối)
  const isInTop = leaderboard.some(u => u.userId === currentUserId);
  if(!isInTop && data.currentUser){
    const myLevel = getLevel(data.currentUser.points); // Tính Level của "YOU" ngoài top
    html += `
      <div style="text-align:center; color:#ccc; margin: 10px 0; font-size:12px;">•••</div>
      <div class="row me">
        <div class="rank-col">#${data.currentUser.rank}</div>
        <div class="name-col">YOU</div>
        <div class="level-col">${myLevel}</div> <div class="points-col">${data.currentUser.points.toLocaleString()}</div>
      </div>
    `;
  }

  document.getElementById("list").innerHTML = html;
}
</script>

</body>
</html>
