<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Contest 2026 - Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #1e2447;
    --accent: #f4c542;
    --bg: #f7f8fc;
    --text-muted: #999;
  }
  body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px 0; }
  
  .container { max-width: 500px; width: 92%; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.08); }

  /* LOGIN BOX */
  .login-box { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px 20px; gap: 15px; text-align: center; }
  .login-box h2 { color: var(--primary); margin: 0 0 10px; font-weight: 800; }
  .login-box input { padding: 14px; border-radius: 12px; border: 1px solid #ddd; width: 80%; font-family: inherit; font-size: 15px; outline: none; }
  .login-box button { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 14px 30px; font-weight: 700; cursor: pointer; width: 85%; transition: 0.2s; }
  .login-box button:hover { opacity: 0.9; }

  /* HEADER */
  .header { background: var(--primary); color: white; text-align: center; padding: 40px 20px 25px; }
  .header h1 { margin: 0; font-size: 28px; letter-spacing: 0.8px; font-weight: 800; text-transform: uppercase; }
  .header p { opacity: 0.8; font-size: 13px; margin: 8px 0; color: #eee; font-weight: 500; }
  .level-badge { background: var(--accent); color: var(--primary); padding: 6px 25px; border-radius: 20px; font-weight: 800; font-size: 17px; display: inline-block; margin-top: 10px; }

  .content { padding: 25px 15px; }

  /* TEAM STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 30px; }
  .stat-box { background: #fff; padding: 12px 5px; border-radius: 16px; border: 1px solid #f0f0f0; text-align: center; }
  .stat-box small { font-size: 10px; color: var(--text-muted); text-transform: uppercase; display: block; font-weight: 700; margin-bottom: 4px; }
  .stat-box span { font-size: 16px; font-weight: 800; color: var(--primary); }

  /* PROGRESS */
  .progress-section { margin-bottom: 35px; }
  .progress-container { background: #eee; border-radius: 20px; height: 28px; overflow: hidden; margin-bottom: 10px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #1e2447, #3d4da0); width: 0%; display: flex; align-items: center; justify-content: flex-end; transition: width 1s ease; }
  .progress-bar-text { color: white; font-size: 12px; font-weight: 800; padding-right: 10px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

  /* LIST STYLES */
  .table-header { display: grid; grid-template-columns: 40px 1.5fr 0.8fr 0.8fr 0.6fr; padding: 0 15px 10px; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
  .list-container { display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 40px 1.5fr 0.8fr 0.8fr 0.6fr; padding: 12px 15px; align-items: center; background: #fff; border-radius: 12px; font-size: 13px; border: 1px solid #f2f2f2; color: #444; }
  
  .row.top-rank { background: #fffdf2; border-color: var(--accent); font-weight: 700; box-shadow: 0 4px 12px rgba(244, 197, 66, 0.1); }
  .row.my-rank { background: #eff2ff; border-color: #3d4da0; border-style: dashed; font-weight: 700; margin-top: 5px; }

  .rank-col { font-weight: 800; text-align: center; }
  .points-col { font-weight: 700; color: var(--primary); }
  .pct-col { font-size: 11px; color: var(--text-muted); text-align: right; }

  .footer { text-align: center; padding: 20px; color: #bbb; font-size: 11px; }
  #widget { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="login-box" id="login-box">
    <h2>Leaderboard</h2>
    <input type="text" placeholder="Enter your userID" id="userIdInput">
    <button onclick="startApp()">View Top Rankings</button>
  </div>

  <div id="widget">
    <div class="header">
      <h1>Spring Contest</h1>
      <p>24 Mar to 24 Jun 2026</p>
      <div id="level-tag" class="level-badge">LEVEL 0</div>
    </div>

    <div class="content">
      <div class="stats-grid" id="team-stats">
        <div class="stat-box"><small>Units</small><span>0</span></div>
        <div class="stat-box"><small>Points</small><span>0</span></div>
        <div class="stat-box"><small>Days Left</small><span>--</span></div>
      </div>

      <div class="progress-section">
        <div class="progress-container">
          <div class="progress-bar" id="progress-bar">
            <span class="progress-bar-text" id="progress-val">0%</span>
          </div>
        </div>
        <div class="progress-info">
          <span id="progress-desc">0 / 1,000 points</span>
          <span id="time-countdown">⏰ --d --h</span>
        </div>
      </div>

      <div class="table-header">
        <div>#</div>
        <div>Participant</div>
        <div>Units</div>
        <div>Points</div>
        <div style="text-align:right">%</div>
      </div>
      
      <div class="list-container" id="table-body">
        </div>
    </div>

    <div class="footer">
      Last updated: <span id="update-time">...</span>
    </div>
  </div>
</div>

<script>
const apiUrl = "https://script.google.com/macros/s/AKfycbw-W_GTkq-BmpNDv8ZfN4psO_e4Rq4f5obqFFi7HwKJLVCYSjNqP3O0Ft6Y6wSK06zXkQ/exec";
const LEVELS = [
  { p: 1000 }, { p: 2000 }, { p: 5000 }, { p: 10000 }, { p: 25000 }, { p: 50000 }, { p: 150000 }
];

let currentUserId = "";

function startApp() {
  currentUserId = document.getElementById("userIdInput").value.trim().toLowerCase();
  if (!currentUserId) return alert("Enter userID");
  document.getElementById("login-box").style.display = "none";
  document.getElementById("widget").style.display = "block";
  loadData();
}

function maskEmail(email) {
  if(!email || !email.includes("@")) return email;
  const parts = email.split("@");
  return parts[0].length <= 4 ? parts[0] : parts[0].slice(0, 2) + "**" + parts[0].slice(-2);
}

function loadData() {
  const cb = "jsonp_cb_" + Date.now();
  window[cb] = data => render(data);
  const s = document.createElement("script");
  s.src = `${apiUrl}?callback=${cb}`;
  document.body.appendChild(s);
}

function render(data) {
  const users = data.users || [];
  const totalP = +data.totalPoints || 0;
  const totalU = +data.totalUnits || 0;
  users.sort((a,b) => b.points - a.points);

  // Cập nhật Header & Stats
  let currentLvl = 0;
  LEVELS.forEach((l, idx) => { if(totalP >= l.p) currentLvl = idx + 1; });
  document.getElementById("level-tag").textContent = `LEVEL ${currentLvl}`;
  
  const days = Math.max(0, Math.floor((new Date("2026-06-24T23:59:59Z") - new Date()) / 864e5));
  document.getElementById("team-stats").innerHTML = `
    <div class="stat-box"><small>Units</small><span>${totalU.toLocaleString()}</span></div>
    <div class="stat-box"><small>Points</small><span>${totalP.toLocaleString()}</span></div>
    <div class="stat-box"><small>Days Left</small><span>${days}</span></div>
  `;

  // Cập nhật Progress
  const nextLvl = LEVELS.find(l => l.p > totalP) || LEVELS[LEVELS.length-1];
  const prevP = currentLvl === 0 ? 0 : LEVELS[currentLvl-1].p;
  const pct = Math.min(100, Math.max(0, ((totalP - prevP) / (nextLvl.p - prevP)) * 100));
  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("progress-val").textContent = Math.floor(pct) + "%";
  document.getElementById("progress-desc").textContent = `${totalP.toLocaleString()} / ${nextLvl.p.toLocaleString()} points`;
  document.getElementById("update-time").textContent = new Date().toLocaleTimeString();

  // Logic: Lấy Top 5 + Tìm vị trí của User hiện tại
  const top5 = users.slice(0, 5);
  const myIndex = users.findIndex(u => u.email.toLowerCase().includes(currentUserId));
  const myData = myIndex !== -1 ? users[myIndex] : null;

  let html = top5.map((u, i) => `
    <div class="row ${i === 0 ? 'top-rank' : ''}">
      <div class="rank-col">${i === 0 ? '👑' : (i + 1)}</div>
      <div class="name-col">${maskEmail(u.email)}</div>
      <div>${u.units}</div>
      <div class="points-col">${u.points}</div>
      <div class="pct-col">${((u.points/totalP)*100).toFixed(1)}%</div>
    </div>
  `).join("");

  // Nếu user không nằm trong Top 5, hiển thị thêm 1 dòng riêng ở dưới
  if (myData && myIndex >= 5) {
    html += `
      <div style="text-align:center; color:#ccc; font-size:10px; margin: 5px 0;">•••</div>
      <div class="row my-rank">
        <div class="rank-col">${myIndex + 1}</div>
        <div class="name-col">${maskEmail(myData.email)} (You)</div>
        <div>${myData.units}</div>
        <div class="points-col">${myData.points}</div>
        <div class="pct-col">${((myData.points/totalP)*100).toFixed(1)}%</div>
      </div>
    `;
  } else if (!myData && currentUserId) {
    html += `<p style="text-align:center; font-size:12px; color:red;">User ID not found in list</p>`;
  }

  document.getElementById("table-body").innerHTML = html;
}
</script>
</body>
</html>
